<!DOCTYPE html>

<!-- A cozy water sort game -->
<!-- Art credits: Character base by Kenney Vleugels for Kenney (www.kenney.nl) -->

<html lang="en">
<head>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Rainy Day">

<script>
  if ('service-worker' in navigator) {
    navigator.serviceWorker.register('service-worker.js');
  }
</script>


<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rainy Day Flow</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
html, body { min-height: 100%; background: #d8e1e6; }
body {
  font-family: 'Jost', sans-serif; color: #4a4038;
  display: flex; flex-direction: column; align-items: center;
  padding: 24px 16px 48px;
  position: relative; z-index: 1; pointer-events: none;
  background-color: #d8e1e6;
  background-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='128' height='128'><path fill='none' stroke='%23FFFFFF' stroke-width='4' stroke-linecap='round' stroke-linejoin='round' opacity='0.15' d='M122 18 L128 12 M110 6 L116 0 M114 38 L90 14 M120 32 L96 8 M108 44 L84 20 M120 96 L96 72 M122 82 L128 76 M110 70 L128 52 M104 64 L128 40 M116 12 L128 0 M116 76 L128 64 M46 6 L52 0 M58 18 L76 0 M52 12 L64 0 M0 12 L12 0 M24 0 L0 24 M0 64 L12 52 M0 76 L18 58 M24 64 L0 88 M52 76 L76 52 M56 32 L32 8 M50 38 L26 14 M44 44 L20 20 M40 64 L64 40 M46 70 L70 46 M0 52 L6 46 M8 32 L32 56 M38 50 L14 26 M56 96 L32 72 M52 128 L70 110 M64 128 L76 116 M0 128 L12 116 M12 128 L18 122 M0 116 L6 110 M40 128 L64 104 M116 128 L128 116 M104 128 L128 104 M102 50 L78 26 M72 32 L96 56 M58 82 L82 58 M88 0 L64 24 M88 64 L64 88 M8 96 L32 120 M76 128 L82 122 M72 96 L96 120 M114 102 L90 78 M102 114 L78 90 M108 108 L84 84 M44 108 L20 84 M50 102 L26 78 M38 114 L14 90'/></svg>");
  min-height: 100dvh;
}
header { text-align: center; margin-bottom: 4px; }
h1 {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: clamp(1.8rem, 6vw, 2.6rem);
  font-weight: 600; letter-spacing: 0.01em; line-height: 1.05; color: #4a4038;
}
h1 em { font-style: italic; font-weight: 500; color: #7a9896; }
.subtitle { font-size: 0.66rem; font-weight: 400; letter-spacing: 0.22em; text-transform: uppercase; color: #8a7e72; margin-top: 5px; }
.sprig { display: block; margin: 5px auto 0; width: 15px; height: 15px; opacity: 0.5; }
.controls { display: flex; flex-direction: column; gap: 6px; margin: 13px 0 10px; align-items: center; }
.controls-row { display: flex; gap: 8px; align-items: center; justify-content: center; }
.leaf-btn {
  font-family: 'Jost', sans-serif; font-size: 0.72rem; font-weight: 500;
  letter-spacing: 0.07em; padding: 7px 16px;
  border: 1px solid rgba(130,115,95,0.38); cursor: pointer; color: #4a4038;
  transition: transform 0.14s ease, background-color 0.14s ease; white-space: nowrap;
  border-radius: 60% 40% 60% 40% / 50% 50% 50% 50%;
  background-color: rgba(150,138,118,0.16);
  pointer-events: auto;
}
.leaf-btn:hover { transform: scale(1.05) translateY(-1px); background-color: rgba(122,152,150,0.22); color: #5a8a88; }
.leaf-select-wrap {
  display: inline-flex; align-items: center;
  border-radius: 55% 45% 55% 45% / 50% 50% 50% 50%;
  pointer-events: auto;
  background-color: rgba(150,138,118,0.16); border: 1px solid rgba(130,115,95,0.38);
  padding: 0 5px 0 12px; overflow: hidden; transition: transform 0.14s ease;
}
.leaf-select-wrap:hover { transform: scale(1.03) translateY(-1px); }
.leaf-select-wrap select {
  font-family: 'Jost', sans-serif; font-size: 0.72rem; font-weight: 500;
  letter-spacing: 0.05em; padding: 7px 20px 7px 0;
  border: none; background: transparent; color: #4a4038;
  cursor: pointer; outline: none; appearance: none; -webkit-appearance: none;
  background-image: url("data:image/svg+xml,%3Csvg width='9' height='5' viewBox='0 0 9 5' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l3.5 3L8 1' stroke='%238a7e72' stroke-width='1.2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat; background-position: right 5px center;
}
.status-bar {
  font-size: 0.66rem; font-weight: 400; letter-spacing: 0.18em;
  text-transform: uppercase; color: #8a7e72; margin-bottom: 6px;
  display: flex; gap: 18px; align-items: center;
}
.best-score { color: #a07858; }
#message {
  min-height: 28px; font-family: 'Cormorant Garamond', serif;
  font-size: 1.25rem; font-style: italic; color: #7a9878;
  margin-bottom: 8px; text-align: center;
}
#message.win { color: #a07858; font-size: 1.6rem; }
.level-label { font-size: 0.63rem; font-weight: 400; letter-spacing: 0.20em; text-transform: uppercase; color: #6a5f55; margin-top: 6px; }
footer { margin-top: 16px; font-size: 0.65rem; font-weight: 400; letter-spacing: 0.14em; text-transform: uppercase; color: #6a5f55; }
#expert-note:not(:empty) { display: block; }
/* Three.js canvas sits fixed behind everything */
#three-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: auto; display: block; }
#confetti-wrap { position: fixed; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 200; display: none; overflow: hidden; }
#confetti-wrap.active { display: block; }
@keyframes petal-fall {
  0%   { opacity: 0.88; transform: translateY(-10px) rotate(0deg) scaleX(1); }
  80%  { opacity: 0.65; }
  100% { opacity: 0;    transform: translateY(102vh) rotate(560deg) scaleX(0.7); }
}
.petal { position: absolute; top: 0; border-radius: 50% 50% 40% 40%; animation: petal-fall linear forwards; }
#mascot { position: fixed; bottom: 28px; left: 20px; width: 108px; height: 108px; z-index: 100; pointer-events: none; }
@keyframes mascot-float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
#mascot { animation: mascot-float 3.6s ease-in-out infinite; }
@keyframes mascot-oops {
  0%   { transform: rotate(0deg); } 20%  { transform: rotate(-12deg); }
  45%  { transform: rotate(10deg); } 65%  { transform: rotate(-7deg); }
  82%  { transform: rotate(5deg); } 100% { transform: rotate(0deg); }
}
#mascot.oops { animation: mascot-oops 0.38s ease; }
@keyframes mascot-yay {
  0%   { transform: translateY(0) rotate(0deg) scale(1); }
  30%  { transform: translateY(-14px) rotate(-8deg) scale(1.12); }
  55%  { transform: translateY(-8px) rotate(6deg) scale(1.08); }
  75%  { transform: translateY(-12px) rotate(-4deg) scale(1.10); }
  100% { transform: translateY(0) rotate(0deg) scale(1); }
}
#mascot.yay { animation: mascot-yay 0.7s cubic-bezier(0.34, 1.4, 0.64, 1) forwards; }
#mascot.floating { animation: mascot-float 3.6s ease-in-out infinite; }
@keyframes mascot-sad {
  0%   { transform: translateY(0) scale(1); }
  25%  { transform: translateY(7px) scale(0.93); }
  60%  { transform: translateY(5px) scale(0.95); }
  85%  { transform: translateY(6px) scale(0.94); }
  100% { transform: translateY(0) scale(1); }
}
#mascot.sad { animation: mascot-sad 0.9s cubic-bezier(0.34,1.0,0.64,1); }

/* ─── Night Mode ─────────────────────────────────────────────── */
body.night-mode {
  background-color: #1a2535;
  background-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='128' height='128'><path fill='none' stroke='%23a0c8e0' stroke-width='4' stroke-linecap='round' stroke-linejoin='round' opacity='0.05' d='M122 18 L128 12 M110 6 L116 0 M114 38 L90 14 M120 32 L96 8 M108 44 L84 20 M120 96 L96 72 M122 82 L128 76 M110 70 L128 52 M104 64 L128 40 M116 12 L128 0 M116 76 L128 64 M46 6 L52 0 M58 18 L76 0 M52 12 L64 0 M0 12 L12 0 M24 0 L0 24 M0 64 L12 52 M0 76 L18 58 M24 64 L0 88 M52 76 L76 52 M56 32 L32 8 M50 38 L26 14 M44 44 L20 20 M40 64 L64 40 M46 70 L70 46 M0 52 L6 46 M8 32 L32 56 M38 50 L14 26 M56 96 L32 72 M52 128 L70 110 M64 128 L76 116 M0 128 L12 116 M12 128 L18 122 M0 116 L6 110 M40 128 L64 104 M116 128 L128 116 M104 128 L128 104 M102 50 L78 26 M72 32 L96 56 M58 82 L82 58 M88 0 L64 24 M88 64 L64 88 M8 96 L32 120 M76 128 L82 122 M72 96 L96 120 M114 102 L90 78 M102 114 L78 90 M108 108 L84 84 M44 108 L20 84 M50 102 L26 78 M38 114 L14 90'/></svg>");
  color: #e8ddd0;
}
body.night-mode h1 { color: #e8ddd0; }
body.night-mode h1 em { color: #7ab8d4; }
body.night-mode .subtitle { color: #b8a898; }
body.night-mode .leaf-btn {
  background-color: rgba(80,110,140,0.22);
  border-color: rgba(120,160,200,0.30);
  color: #e8ddd0;
}
body.night-mode .leaf-btn:hover { background-color: rgba(90,145,175,0.32); color: #7ab8d4; }
body.night-mode .leaf-select-wrap {
  background-color: rgba(80,110,140,0.22);
  border-color: rgba(120,160,200,0.30);
}
body.night-mode .leaf-select-wrap select {
  color: #e8ddd0;
  background-image: url("data:image/svg+xml,%3Csvg width='9' height='5' viewBox='0 0 9 5' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l3.5 3L8 1' stroke='%23b8a898' stroke-width='1.2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
}
body.night-mode .status-bar { color: #b8a898; }
body.night-mode .best-score { color: #d4af70; }
body.night-mode #message { color: #88a8c0; }
body.night-mode #message.win { color: #d4af70; }
body.night-mode .level-label { color: #a09080; }
body.night-mode footer { color: #a09080; }
#mascot-glow-wrap { transition: filter 0.6s ease, opacity 0.6s ease; }
body.night-mode #mascot-glow-wrap { filter: url(#sk-glow); opacity: 0.72; }
</style>
</head>

<canvas id="three-canvas"></canvas>

<!-- Mascot — hand-drawn outline filter, drop shadow -->

<svg id="mascot" viewBox="208 585 84 120" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
<defs>

<filter id="sk-wobble" x="-6%" y="-6%" width="112%" height="112%">
  <feTurbulence type="fractalNoise" baseFrequency="0.055" numOctaves="2" seed="7" result="n"/>
  <feDisplacementMap in="SourceGraphic" in2="n" scale="1.1" xChannelSelector="R" yChannelSelector="G"/>
</filter>

<filter id="sk-shadow" x="-12%" y="-8%" width="130%" height="130%">
  <feDropShadow dx="1.2" dy="2.8" stdDeviation="2.8" flood-color="#2a3a50" flood-opacity="0.18"/>
</filter>

<!-- Outer hand-drawn outline: dilate the alpha, colour it dark, merge under source -->

<filter id="sk-outline" x="-10%" y="-10%" width="120%" height="120%">
  <feMorphology operator="dilate" radius="1.4" in="SourceAlpha" result="expanded"/>
  <feFlood flood-color="#2a3a50" result="ink"/>
  <feComposite in="ink" in2="expanded" operator="in" result="outline"/>
  <feMerge>
    <feMergeNode in="outline"/>
    <feMergeNode in="SourceGraphic"/>
  </feMerge>
</filter>

    <div class="leaf-select-wrap">
      <select id="level-select" onchange="loadLevel(parseInt(this.value))">

        <option value="1">Medium</option>
        <option value="2">Hard</option>
        <option value="3">Frozen</option>
        <option value="4">Gradient</option>
        <option value="5">Gravity</option>
        <option value="6">Sand Art</option>

  </div>
  <div class="controls-row">
    <button class="leaf-btn" onclick="undoMove()">⟵ Undo</button>
    <button class="leaf-btn" id="sos-btn" onclick="triggerSOS()">SOS</button>

  </div>
</div>
